    description: "Memberships\n\nAnyone can play at All In. We just require you to sign up on our Court Reserve management software to book a court online. Your membership grants you access to all of our locations.\n\nWe have 3 types of memberships:\nNon- Member (Free) memberships - Free to sign up and no recurring monthly fees. You just pay a higher rate for reservations. (See rates above)\nMonthly memberships - Can be cancelled at any time. (See monthly fee and rates above)\nAnnual memberships - Paid upfront for the full 12 months.\n\nSign Up fees apply to both monthly and annual memberships.\n\n\nReservation Cancellation Policy:\n\n12+ hours prior to reservation or event: Full refund to the original form of payment\n\nLess than 12 hours: Cancellation is reviewed by All In with no guarantee of refund barring emergencies or extenuating circumstances that will be considered by the All In Team on a case by case basis.\n\nReserving with Others\n\nWe suggest that everyone included in the reservation have a profile in the CourtReserve App so each person can pay their own court fee rate. If a player doesn’t have a CourtReserve account, you can add them as a “Guest,” and the reservation maker will cover their fee plus the guest fee at the non-member rate.\n\nExample 1: One Monthly Member (Reservation Maker), two guests, one Non-Member, reserve a court.  The rate example is: $7+$9+$9+$9= $34 per hour. The one monthly member (Reservation maker) pays for his fee of $7 + the two guests $9 + $9 totaling $25. The non-member pays his $9 reservation fee.\n\nExample 2: Two Monthly Members and two Non-Members reserve a court during, the rate example is: $7+$7+$9+$9= $32 per hour, and each person would pay separately on their CourtReserve account."
