    description: "SPORTIME Pickleball Englewood is on the way! Scheduled to open in fall 2024, our brand new facility, just minutes from the George Washington Bridge, will offer players of all ages and levels the New Jersey pickleball club they have been waiting for. Located right off Route 4 in Englewood, N.J., our modern, fully renovated facility will welcome picklers from New Jersey and from  New York City and beyond.\n\nPlayers will enjoy 12 brand-new, dedicated courts in year-round, climate controlled, buildings, the best court lighting anywhere, a private party room with court viewing, 2 player lounges, a pro shop with the latest apparel and paddles, a grab and go cafe, changing rooms with showers, and much more!\n\nWhether you are looking for court-time to play with friends, competitive leagues and tournaments, social, level-based open play sessions, or instructional clinics and lessons, SPORTIME Pickleball Englewood will have it all, and close to where you live, work, shop and dine!\n\nPlanning an event? If you or someone you know loves pickleball as much as we do, SPORTIME Pickleball Englewood will offer the perfect venue for your  birthday or anniversary celebration, corporate party or team building event, or for any special event you can imagine with us."
