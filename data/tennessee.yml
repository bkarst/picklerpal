    description: "ATHENS PARKS & RECREATION ANNOUNCES GRAND RE-OPENING OF THE TENNIS/PICKLEBALL FACILITY AT THE INGLESIDE RECREATION COMPLEX\n ATHENS, TENNESSEE – September 10th, 2024 \nThe Athens Parks and Recreation Department will be hosting a grand re-opening ceremony celebrating the completion of the renovated tennis and pickleball facility at the Ingleside Recreation Complex on Tuesday, September 17th at 4:00pm.\n“This is a monumental event for both the Parks and Recreation Department and the citizens of Athens” said Parks and Recreation Director Matt Siniard. “I want to thank all of those who were involved with this project from its conceptual stages, planning stages, and those who were supportive of our department the entire way. None of this would have been possible without their investment in our community.”\nThe newly renovated Ingleside Recreation Complex tennis and pickleball courts feature six dedicated pickleball courts and six tennis courts. The courts will be available to the public on a first come, first serve basis for local play. Reservations for tournaments can be made by completing a tournament packet provided by the Parks and Recreation Department. Additional parking has been created for the courts on the corner of Ingleside Avenue and Forrest Avenue. A new sidewalk has been created to connect the court parking lot to the walkway alongside Ingleside Avenue.\nFor more information, please contact the Office of Parks & Recreation at (423) 744-2704."
