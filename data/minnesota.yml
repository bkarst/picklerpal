    description: "Not your average Pickleball club - It’s clear the moment you walk in the door - Chip’s is different. Not only does this space lend itself to fun & competitive pickleball play, but it’s so much more than that.\n\nTWELVE COURTS\nWe feature 12 dedicated pickleball courts with tournament-sized playing margins and chain-link fence barriers so you can play your best game. \n\nCAFE & BAR\nOur people are everything at Chip’s. We intentionally created spaces like our cafe & bar for gathering and enjoying time together. Our curated selection of drinks and delicious food can also be enjoyed courtside!\n\nPRIVATE EVENT SPACE\nFrom corporate events to your kid’s birthday party, this is the spot to be. We created this space to gather privately and play on dedicated courts so that you and your group can create memorable experiences together. Capacity for groups up to 50+\n\nSAUNA & COLD PLUNG\nWe are here to support your active lifestyle with top-notch recovery tools. Our sauna and cold plunge are among the best for recovery, and we have onsite showers for your convenience.\n\nWe’ve also built spaces for stretching and strength exercises so that we can be a one-stop shop for improving and maintaining your fitness."
