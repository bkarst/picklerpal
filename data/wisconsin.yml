    description: "Wray Park is in the Town of Brookfield, not the City of Brookfield.  The Wray Park pickleball courts are managed by the Town of Brookfield Parks & Rec department:  https://townofbrookfield.com/departments/parks-recreation/ \n\nChad Brown, Director   parkrec@townofbrookfield.com   (262) 796-3781\nOffice:  645 N. Janacek Rd., Brookfield, WI 53045\n\nMay - September the courts are reserved for various pickleball programs managed by the Town of Brookfield Parks & Rec department.  See schedule posted on the courts.  Subject to change.  Up to two courts can be reserved by the public.  If the courts are not reserved by the Parks department or reserved privately, the courts are open to the public, first come first served.  Limit play to 1 hour when others are waiting.\n\nUnless otherwise noted, the Town of Brookfield Open Play pickleball sessions require registration and are for all levels of players.  Player rotations and possibly designating courts for more advanced players will be managed by the Volunteer Court Coordinator."
