    description: "See website for reservation hours and free play hours.\n\nThe City of Santa Clara has partnered with Lifetime Activities to introduce a new Pickleball Pilot Program.\n\nWith the resurfacing of two tennis courts in Central Park near the Community Recreation Center (CRC), the City of Santa Clara has taken this opportunity to cater to the growing interest in pickleball by transforming the two courts into a flexible community recreational area. Six pickleball courts with blended lines have been introduced for a better multi-sport racquet experience for the community.\n\nPlayers must check in by phone or in person before going to their assigned court.\n\nReservations can be made by phone at 408-247-0178 or online.\n\nLifetime Activities will be providing pickleball nets during designated pickleball hours. Once the pickleball hours conclude, tennis play will resume and the courts will remain illuminated until 10 p.m. \n\nPro shop is located at 2625 Hayward Drive, Santa Clara, CA 95051"
