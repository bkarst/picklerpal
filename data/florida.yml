    description: "Portside Pickle is the nation’s premier pickleball paradise, located along 380-feet of waterfront promenade on Commendencia Slip in the historic downtown Port of Pensacola, Florida. This world class facility offers unmatched amenities for competitive players, recreational players, tourists, spectators, and cocktail enthusiasts alike.  Portside currently offers 7 tournament-sized outdoor courts (Ben Johns Signature), abundant entertainment space, and a 240-seat waterfront bar & eatertainment area. Phase 2, launching in 2026, boasts 10-12 indoor pickleball courts, padel, high-level ping pong, golf and baseball simulators, and 12-16 market stalls. \n\nPortside Pickle puts the FUN!!! and joy inherent to America’s fastest growing sport center stage, providing a 5-star guest experience in a top-notch facility. Portside Pickle is not merely a venue but a true pickleball community offering an elevated experience in a truly idyllic Gulf Coast setting."
