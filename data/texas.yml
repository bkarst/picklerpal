    amenities: [restrooms, training, locker rooms, pro shop, lighted, food, water, youth, wheelchair accessible, adaptive]
    description: "Houston’s premier indoor pickleball destination. Casa offers climate-controlled courts with cushioned, sound-dampened surfaces, perfect for year-round play. Players enjoy world-class coaching, DUPR nights, leagues, and open play sessions. Off the court, relax at the Vista Lounge bar or connect with a vibrant pickleball community. Whether you’re a beginner or competitive player, Casa Pickle is where Houston comes to play, train, and socialize."
    access_details: "Casa Pickle welcomes both members and visitors. Memberships are available for players who want unlimited access, priority booking, and exclusive perks like leagues, clinics, and member-only events. For those just dropping in, we also offer flexible visitor passes and daily court fees, making it easy to join the action without a long-term commitment. Whether you’re looking for a full membership experience or just a single day of play, Casa Pickle has an option for you."
    schedule_details: "Casa Pickle offers a full schedule designed for every type of player. Open play is available in rotating intervals throughout the day, with lessons and clinics offered regularly alongside leagues and special events. Weekly highlights include DUPR Nights, Golden Hour Open Play with food trucks, and our Smash & Sweat fitness sessions. For the most up-to-date schedule and to reserve your spot, find us on CourtReserve."
