    description: "Welcome to The Pickle Lodge — where pickleball passion and top-notch indulgence collide. Here, you won’t just play pickleball; you’ll live it. With 17 dedicated, individually-fenced indoor courts and 6 more outdoors, we’re redefining the game and the entire experience. Designed by players, for players, every detail was built with your perfect day on the court in mind.\n\nBut the Lodge is more than courts—it’s community, connection, and celebration. Our conference rooms are the ideal backdrop for private gatherings or corporate parties, offering a unique space where business meets play. And with a full team of pros and instructors on site daily, your game will sharpen while your fun multiplies. (Bonus: memberships aren’t required—you can jump right into the action, no strings attached.)\n\nWorked up an appetite? Drift over to Two Cities Pizza, where salads, sandwiches, pizzas, calzones, and wings keep hunger at bay. Need to quench your thirst? Erne’s Pickle Bar has you covered with 18 rotating beer taps, plus an impressive lineup of cans, seltzers, ciders, wine, and spirits.\n\nSo grab your paddle, fuel up, kick back, and soak in the good vibes. At The Pickle Lodge, you’ll find the ultimate pickleball and dining experience—your new favorite hangout both on and off the court."
    access_details: "Memberships are not required at The Pickle Lodge, but they are designed to save you money. If you're interested in playing at The Pickle Lodge, download our app and create a non-memnber profile to view our entire calendar of open play sessions and clinics, to reserve a court or book a lesson with a certified instructor."
