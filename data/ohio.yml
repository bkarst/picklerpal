    description: "Dublin’s Coffman eight (8) outdoor Pickleball courts are located at 6555 Commerce Parkway, next to the Dublin Police station and skateboard park. Lights are on from 5am until 11:00pm. There are heated restrooms, a water refill station (closed for the winter), picnic tables, shelter house, fencing between courts, and a 10 foot wind screens around the outside. The courts have a fiberglass mesh underneath to give them some bounce.  The courts have three colors with gritty white lines. If all courts are full, there is a 4 person paddle rack rotation, holding 64 paddles, to allow everyone a chance to play. Plenty of parking. Free to the public."
