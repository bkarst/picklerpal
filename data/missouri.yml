    access_details: "Introducing our open play all access courts membership!  What does that get you?  Unlimited access to open play times. Unlimited access to pickup game times.  🏀monday's 7-9pm- women's pickup night 🏀wednesday's 6-9pm- men's pickup night 🏓friday 3 for $3 pickleball (we know this isn't a pickleball emoji 😎) 🏀friday night hoops (pickup style)- all ages, adult/middle school designated courts.  ✅ play your favorite sports — basketball, volleyball, pickleball, futsal. First come first serve for courts. Full court play is not guaranteed.  ✅ no reservations needed — just show up, check in with front desk, and play.      Introducing the weekday daytime unlimited pass!  Love pickleball, some daytime hoops, or to spike around with the volleyball in the morning or on your lunch break? Now you can play as much as you want during the day!  ✅ unlimited access to courts 8:00am - 3:00pm, monday - friday ✅ no need to reserve — just show up and play  * courts not guaranteed. * paddle stacking will apply when needed. * bring a guest for additional $5 (open-3pm, limit one guest at this rate. Additional guests will be at regular rate). Guests will pay at front desk (cashless)."
