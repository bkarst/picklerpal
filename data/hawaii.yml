    description: "Please stack your paddles at the court 8 paddle rack. James Douglas onsite USAPA ambassador present most days. \n\nThere are 4 courts with portable nets during open play times. Court 11 is a permanent net shared with paddle tennis players and on the play clock (45min allowed if someone is waiting). Courts ae often occupied by a large group from the Oahu pickleball league, leaving only 2 or 3 courts available for drop in. In addition there is a company operating a pickleball school that reserves one of the courts frequently. We encourage:\n\n-play with aloha\n-games are played sideout scoring to 11 (win by 2)\n-no double stacking paddles\n-no reserving paddle positions for others\n\nMahalo for your kokua!"
