    description: "What's the Dill with pickleball?! We are bringing the world's fastest growing sport to South Baltimore's best pickleball venue. Join us on Monday's at Latrobe park for the paddle revolution with our OUTDOOR pickleball. Up to 2 courts playing at the same time. WE PROVIDE THE PADDLES AND BALLS, you just show up and play!\n\n\n\nHighlights\n2v2 Pickleball \nequipment provided\n\nSelf officiated\nopen gender\nAll Skill Levels invited to play\n\n\n\nWe do not provide refunds. If games are cancelled due to not enough players, we will issue a credit to your account to be used for any other league or pickup.\n\n\n\nIncluded with Volo Pass Membership! Not a Volo Pass member? Become one for just $35/mo & gain access to unlimited pickups & MORE!"
